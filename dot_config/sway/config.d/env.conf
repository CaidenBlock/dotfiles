# GTK and Theming
exec dbus-update-activation-environment --systemd GTK_THEME=Adwaita:dark
exec dbus-update-activation-environment --systemd GTK_CSD=0

# Wayland Fixes
exec dbus-update-activation-environment --systemd MOZ_ENABLE_WAYLAND=1
exec dbus-update-activation-environment --systemd MOZ_DBUS_REMOTE=1
exec dbus-update-activation-environment --systemd ELECTRON_OZONE_PLATFORM_HINT=wayland
exec dbus-update-activation-environment --systemd QT_QPA_PLATFORM=wayland
exec dbus-update-activation-environment --systemd QT_QPA_PLATFORMTHEME=qt6ct
exec dbus-update-activation-environment --systemd QT_WAYLAND_DISABLE_WINDOWDECORATION=1
exec dbus-update-activation-environment --systemd GDK_BACKEND=wayland
exec dbus-update-activation-environment --systemd GDK_DPI_SCALE=1.5

# Java/XWayland Fix
exec dbus-update-activation-environment --systemd _JAVA_AWT_WM_NONREPARENTING=1

# Terminal and Shell
exec dbus-update-activation-environment --systemd SHELL=/usr/bin/fish
exec dbus-update-activation-environment --systemd TERMINAL=footclient
